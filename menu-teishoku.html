<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定食メニュー | 旬食工房きよし</title>
    <meta name="description" content="旬食工房きよしの定食メニュー一覧。ご飯、味噌汁、おかずがついたお得な定食をご用意しています。">
    <link rel="stylesheet" href="styles-japanese.css?v=23">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1 class="site-title">旬食工房きよし</h1>
        <button class="hamburger" id="hamburger" aria-label="メニュー">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="nav" id="nav">
            <a href="index.html#news" class="nav-link">お知らせ</a>
            <a href="index.html" class="nav-link">ホーム</a>
            <a href="index.html#menu" class="nav-link">メニュー</a>
            <a href="index.html#access" class="nav-link">アクセス</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-background">
            <div class="hero-overlay"></div>
        </div>
        <div class="hero-content">
            <div class="hero-text">
                <p class="hero-year">定食メニュー</p>
                <h2 class="hero-title">毎日の食卓に<br>温かい定食を</h2>
                <p class="hero-subtitle">ご飯、味噌汁、おかずがついたお得な定食</p>
            </div>
        </div>
    </section>

    <div class="container">
        <!-- Menu Section -->
        <section class="menu-section">
            <div class="menu-vertical">
                <h3 class="section-title">定食メニュー</h3>
            </div>
            <div class="menu-content">
                <!-- メニュー表画像 -->
                <div class="menu-image-section">
                    <h4 class="menu-image-title">📋 定食メニュー（クリックで拡大）</h4>
                    <div class="menu-images-container">
                        <img src="images/メニュー1.png" alt="旬食工房きよし 定食メニュー表" class="menu-table-image clickable" onclick="openLightbox(this)">
                        <img src="images/メニュー2.png" alt="旬食工房きよし 定食メニュー表（続き）" class="menu-table-image clickable" onclick="openLightbox(this)">
                    </div>
                </div>

                <!-- ライトボックス（モーダル） -->
                <div id="lightbox" class="lightbox" onclick="closeLightbox()">
                    <span class="lightbox-close">&times;</span>
                    <img class="lightbox-content" id="lightbox-img">
                </div>

                <div class="menu-note-section">
                    <p class="menu-note">
                        ※価格はすべて税込み表記です
                    </p>
                    <p class="menu-note">
                        ※ご予約承ります
                    </p>
                </div>

                <div class="back-link">
                    <a href="index.html#menu" class="back-btn">← メニュー一覧に戻る</a>
                </div>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-name">旬食工房きよし</p>
        <p class="footer-address">〒889-0602 宮崎県東臼杵郡門川町南町3-21</p>
        <p class="footer-tagline">46年の進化、変わらぬ想い</p>
    </footer>

    <script src="script-japanese.js?v=4"></script>
    <script>
        // ライトボックス機能
        function openLightbox(img) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = img.src;
            lightbox.classList.add('show');
            document.body.classList.add('lightbox-open');
            document.body.style.overflow = 'hidden';
            // ライトボックスのスクロール位置をトップにリセット
            lightbox.scrollTop = 0;
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('show');
            document.body.classList.remove('lightbox-open');
            document.body.style.overflow = 'auto';
        }

        // ESCキーで閉じる
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
